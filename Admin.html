<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b1422; --bg2: #0f1a2c; --bg3: #131e30; --bg4: #1a2740;
  --border: rgba(255,255,255,0.08); --text: #e8eef7; --text2: rgba(232,238,247,0.58); --text3: rgba(232,238,247,0.36);
  --red: #F08A8A; --blue: #6BC4D6; --yellow: #F5C66B; --green: #79D89F;
  --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.anim-in { animation: fadeIn 0.2s ease forwards; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }
.nav { height: 50px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 20px; flex-shrink: 0; }
.nav-logo { display: flex; align-items: center; gap: 8px; margin-right: 16px; }
.nav-logo-mark { width: 26px; height: 26px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.nav-title { font-size: 14px; font-weight: 700; }
.nav-badge { font-size: 9px; font-family: var(--mono); background: rgba(107,196,214,0.12); color: var(--blue); border: 1px solid rgba(107,196,214,0.25); border-radius: 4px; padding: 1px 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* Body */
.body { flex: 1; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.sidebar-head h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-family: var(--mono); margin-bottom: 10px; }
.sidebar-search { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; }
.sidebar-search input { background: none; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 12px; width: 100%; }
.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.company-item { padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 6px; margin: 0 6px; transition: background 0.1s; }
.company-item:hover { background: var(--bg3); }
.company-item.active { background: var(--bg4); }
.company-logo { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; font-weight: 700; color: white; }
.company-name { font-size: 13px; font-weight: 600; color: var(--text); }
.company-meta { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
.company-status { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.sidebar-footer { padding: 12px 14px; border-top: 1px solid var(--border); }
.add-btn { width: 100%; padding: 8px; background: rgba(107,196,214,0.10); border: 1px solid rgba(107,196,214,0.25); border-radius: 8px; color: var(--blue); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.add-btn:hover { background: rgba(107,196,214,0.18); }

/* Main content */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--bg2); flex-shrink: 0; }
.tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.card-hd { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-family: var(--mono); }
.card-bd { padding: 16px; }

/* Form fields */
.field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-group.single { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.field input, .field select { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; color: var(--text); font-size: 13px; font-family: var(--sans); outline: none; transition: border-color 0.15s; }
.field input:focus, .field select:focus { border-color: var(--blue); }
.field input[type="color"] { height: 36px; padding: 3px 6px; cursor: pointer; }
.field-hint { font-size: 10px; color: var(--text3); margin-top: 2px; }
.save-row { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
.btn { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 600; font-family: var(--sans); cursor: pointer; border: none; transition: all 0.12s; }
.btn-primary { background: var(--blue); color: #0b1422; }
.btn-primary:hover { background: #85cede; }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); }
.btn-danger { background: rgba(230,57,70,0.1); color: var(--red); border: 1px solid rgba(230,57,70,0.25); }
.btn-danger:hover { background: rgba(230,57,70,0.2); }

/* Color swatch row */
.swatch-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.swatch { width: 28px; height: 28px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; }
.swatch:hover { transform: scale(1.12); }
.swatch.selected { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }

/* Stat bar */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.03em; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; font-family: var(--mono); }

/* Users table */
.user-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.user-row:last-child { border-bottom: none; }
.user-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; }
.user-email { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.role-badge { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; font-family: var(--mono); margin-left: auto; }
.role-badge.admin { background: rgba(245,198,107,0.12); color: var(--yellow); }
.role-badge.tech { background: rgba(107,196,214,0.12); color: var(--blue); }
.role-badge.viewer { background: rgba(79,79,79,0.12); color: var(--text3); }

/* Preview phone */
.preview-wrap { display: flex; gap: 24px; align-items: flex-start; }
.preview-phone { width: 240px; flex-shrink: 0; background: #111; border-radius: 28px; padding: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid #333; }
.preview-screen { border-radius: 20px; overflow: hidden; background: #0b1422; }
.preview-notes { flex: 1; }
.preview-note { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
.preview-note:last-child { border-bottom: none; }
.preview-note-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.preview-note-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
.preview-note-label { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 1px; }

/* Credential row */
.cred-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.cred-row:last-child { border-bottom: none; }
.cred-key { font-size: 11px; font-family: var(--mono); color: var(--text3); width: 140px; flex-shrink: 0; }
.cred-val { font-size: 12px; font-family: var(--mono); color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cred-copy { padding: 3px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; font-size: 10px; color: var(--text3); cursor: pointer; font-family: var(--mono); transition: all 0.12s; flex-shrink: 0; }
.cred-copy:hover { color: var(--text); border-color: var(--text3); }

/* CSV Import */
.drop-zone { border: 2px dashed var(--border); border-radius: 14px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--blue); background: rgba(107,196,214,0.04); }
.drop-zone-icon { width: 52px; height: 52px; background: var(--bg3); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.import-steps { display: flex; gap: 0; margin-bottom: 24px; }
.import-step { flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 12px; color: var(--text3); border-bottom: 2px solid var(--border); }
.import-step.active { color: var(--blue); border-bottom-color: var(--blue); }
.import-step.done { color: var(--green); border-bottom-color: var(--green); }
.import-step-num { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.mapper-row { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.mapper-label { font-size: 12px; font-weight: 600; color: var(--text); }
.mapper-req { font-size: 9px; font-family: var(--mono); color: var(--red); margin-left: 4px; }
.mapper-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--sans); font-size: 12px; padding: 6px 10px; outline: none; width: 100%; }
.mapper-select:focus { border-color: var(--blue); }
.preview-table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: var(--mono); }
.preview-table th { padding: 7px 10px; background: var(--bg3); color: var(--text3); text-align: left; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.preview-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.preview-table tr:last-child td { border-bottom: none; }
.type-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; font-family: var(--mono); cursor: pointer; border: 1px solid; transition: all 0.15s; }
.type-pill.selected { background: rgba(107,196,214,0.12); color: var(--blue); border-color: rgba(107,196,214,0.3); }
.type-pill.unselected { background: transparent; color: var(--text3); border-color: var(--border); }

/* Connection test */
.conn-test { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg3); border-radius: 8px; font-size: 12px; font-family: var(--mono); }
.conn-test-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>

function ThemeToggle() {
  const [mode, setMode] = React.useState(window.Theme ? Theme.getMode() : 'system');
  const icons = { dark: '🌙', light: '☀️', system: '⚙' };
  const cycle = () => { Theme.cycle(); setMode(Theme.getMode()); };
  return (
    <button onClick={cycle} style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', fontSize:11, fontFamily:'var(--mono)', cursor:'pointer' }}>
      <span>{icons[mode]}</span><span>{mode.charAt(0).toUpperCase()+mode.slice(1)}</span>
    </button>
  );
}

// ── Pumps Tab ────────────────────────────────────────────────
const MODELS = ['CTC EcoAir 520','CTC EcoAir 620','CTC EcoHeat 400','CTC EcoHeat 600','CTC GSi 612'];
const REGIONS = ['Streymoy','Eysturoy','Norðoyar','Sandoy','Suðuroy','Vágar'];
const EMPTY_FORM = { customer:'', phone:'', email:'', address:'', region:REGIONS[0], model:MODELS[0], installed:new Date().toISOString().slice(0,10), myuplink_device_id:'' };

function PumpsTab() {
  const { useState: us, useEffect: ue } = React;
  const [pumps,    setPumps]    = us([]);
  const [loading,  setLoading]  = us(true);
  const [showForm, setShowForm] = us(false);
  const [editPump, setEditPump] = us(null);   // null = adding new
  const [saving,   setSaving]   = us(false);
  const [geoStatus,setGeoStatus]= us('');
  const [form,     setForm]     = us(EMPTY_FORM);
  const [flash,    setFlash]    = us('');
  const [search,   setSearch]   = us('');

  function showFlash(msg) { setFlash(msg); setTimeout(() => setFlash(''), 2800); }

  // Load all pumps from Supabase
  ue(() => {
    (async () => {
      if (!window.YV_SB) { setLoading(false); return; }
      const { data, error } = await YV_SB.from('pumps').select('*').order('id');
      if (!error && data) setPumps(data);
      setLoading(false);
    })();
  }, []);

  function startAdd() {
    setEditPump(null); setForm(EMPTY_FORM); setGeoStatus(''); setShowForm(true);
  }

  function startEdit(p) {
    setEditPump(p);
    setForm({
      customer: p.customer || '', phone: p.phone || '', email: p.email || '',
      address: p.address || '', region: p.region || REGIONS[0], model: p.model || MODELS[0],
      installed: p.installed || new Date().toISOString().slice(0,10),
      myuplink_device_id: p.myuplink_device_id || '',
    });
    setGeoStatus(''); setShowForm(true);
  }

  function cancelForm() { setShowForm(false); setEditPump(null); setGeoStatus(''); }

  async function handleSave() {
    if (!form.customer.trim() || !form.address.trim()) return;
    setSaving(true);

    // Geocode only if address changed (or new pump)
    let coords = editPump ? { lat: editPump.lat, lng: editPump.lng } : null;
    if (!editPump || form.address !== editPump.address) {
      setGeoStatus('Geocoding address…');
      coords = await YV.geocodeAddress(form.address);
      setGeoStatus(coords
        ? '✓ ' + coords.lat.toFixed(4) + ', ' + coords.lng.toFixed(4)
        : '⚠ Address not found — saving without map pin');
    }

    const payload = {
      customer: form.customer.trim(),
      phone:    form.phone.trim()    || null,
      email:    form.email.trim()    || null,
      address:  form.address.trim(),
      region:   form.region,
      model:    form.model,
      installed:form.installed,
      myuplink_device_id: form.myuplink_device_id.trim() || null,
      lat: coords?.lat ?? null,
      lng: coords?.lng ?? null,
    };

    if (editPump) {
      const { error } = await YV_SB.from('pumps').update(payload).eq('id', editPump.id);
      if (error) { showFlash('❌ ' + error.message); }
      else {
        setPumps(ps => ps.map(p => p.id === editPump.id ? { ...p, ...payload } : p));
        showFlash('✓ Changes saved'); cancelForm();
      }
    } else {
      const id = 'P' + String(Date.now()).slice(-6);
      const { error } = await YV_SB.from('pumps').insert({
        id, ...payload, status:'ok', cop:0, energy_today:0, last_seen:'never', alerts:[],
      });
      if (error) { showFlash('❌ ' + error.message); }
      else {
        const { data } = await YV_SB.from('pumps').select('*').order('id');
        if (data) setPumps(data);
        showFlash('✓ Pump added to fleet'); cancelForm();
      }
    }
    setSaving(false); setTimeout(() => setGeoStatus(''), 2000);
  }

  async function handleDelete(id) {
    if (!confirm('Remove this pump from the fleet? This cannot be undone.')) return;
    const { error } = await YV_SB.from('pumps').delete().eq('id', id);
    if (!error) { setPumps(ps => ps.filter(p => p.id !== id)); showFlash('✓ Pump removed'); }
    else showFlash('❌ ' + error.message);
  }

  const statusDot = s => ({ ok:'#79D89F', warning:'#F5C66B', fault:'#F08A8A' }[s] || '#4a6480');
  const filtered = pumps.filter(p =>
    !search ||
    p.customer?.toLowerCase().includes(search.toLowerCase()) ||
    p.address?.toLowerCase().includes(search.toLowerCase()) ||
    p.id?.toLowerCase().includes(search.toLowerCase())
  );

  const InputField = ({ k, label, placeholder }) => (
    <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:11, color:'var(--text2)', marginBottom:4 }}>{label}</div>
      <input value={form[k]} onChange={e => setForm(f => ({...f, [k]: e.target.value}))}
        placeholder={placeholder || ''}
        style={{ width:'100%', padding:'7px 10px', borderRadius:6, border:'1px solid var(--border)',
          background:'var(--bg)', color:'var(--text)', fontSize:13, boxSizing:'border-box', outline:'none' }}/>
    </div>
  );

  const SelectField = ({ k, label, options }) => (
    <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:11, color:'var(--text2)', marginBottom:4 }}>{label}</div>
      <select value={form[k]} onChange={e => setForm(f => ({...f, [k]: e.target.value}))}
        style={{ width:'100%', padding:'7px 10px', borderRadius:6, border:'1px solid var(--border)',
          background:'var(--bg)', color:'var(--text)', fontSize:13, outline:'none' }}>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );

  return (
    <div className="anim-in">
      {flash && (
        <div style={{ padding:'8px 14px', background: flash.startsWith('❌') ? 'rgba(192,57,43,0.1)' : 'rgba(30,158,94,0.1)',
          border:`1px solid ${flash.startsWith('❌') ? 'rgba(192,57,43,0.25)' : 'rgba(30,158,94,0.25)'}`,
          borderRadius:8, fontSize:12, color: flash.startsWith('❌') ? '#e07065' : '#79D89F',
          marginBottom:12, fontFamily:'var(--mono)' }}>
          {flash}
        </div>
      )}

      <div className="card">
        <div className="card-hd">
          <span className="card-title">Fleet — {pumps.length} pumps</span>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <input placeholder="Search pumps…" value={search} onChange={e => setSearch(e.target.value)}
              style={{ padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)',
                background:'var(--bg3)', color:'var(--text)', fontSize:12, outline:'none', width:160 }}/>
            <button className="btn btn-primary" style={{ fontSize:11, padding:'4px 12px' }}
              onClick={showForm && !editPump ? cancelForm : startAdd}>
              {showForm && !editPump ? 'Cancel' : '+ Add Pump'}
            </button>
          </div>
        </div>

        {/* Add / Edit form */}
        {showForm && (
          <div style={{ padding:'16px', borderBottom:'1px solid var(--border)', background:'var(--bg)' }}>
            <div style={{ fontSize:12, fontWeight:600, color:'var(--text2)', fontFamily:'var(--mono)',
              textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:14 }}>
              {editPump ? `Editing ${editPump.id} — ${editPump.customer}` : 'New Pump'}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px' }}>
              <InputField k="customer"           label="Customer name"         placeholder="e.g. Jón Petersen"/>
              <InputField k="phone"              label="Customer phone"        placeholder="+298 …"/>
              <InputField k="email"              label="Customer email"        placeholder="jon@example.com"/>
              <InputField k="installed"          label="Installation date"     placeholder="YYYY-MM-DD"/>
              <InputField k="address"            label="Full address (for map)"placeholder="e.g. Áarvegur 12, Tórshavn"/>
              <SelectField k="region"            label="Region"               options={REGIONS}/>
              <SelectField k="model"             label="Pump model"           options={MODELS}/>
              <InputField k="myuplink_device_id" label="MyUplink Device ID"   placeholder="e.g. ET731020421655"/>
            </div>
            {geoStatus && (
              <div style={{ fontSize:11, fontFamily:'var(--mono)', color:'var(--text2)', marginBottom:12 }}>{geoStatus}</div>
            )}
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving} style={{ opacity:saving?0.6:1 }}>
                {saving ? 'Saving…' : editPump ? 'Save Changes' : 'Add to Fleet'}
              </button>
              <button className="btn btn-ghost" onClick={cancelForm}>Cancel</button>
            </div>
          </div>
        )}

        {/* Pump list */}
        <div className="card-bd" style={{ padding:0 }}>
          {loading
            ? <div style={{ padding:'28px', textAlign:'center', color:'var(--text3)', fontSize:13 }}>Loading pumps from Supabase…</div>
            : filtered.length === 0
            ? <div style={{ padding:'28px', textAlign:'center', color:'var(--text3)', fontSize:13 }}>
                {search ? 'No pumps match your search.' : 'No pumps yet — click + Add Pump.'}
              </div>
            : filtered.map(p => (
              <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 16px',
                borderBottom:'1px solid var(--border)', transition:'background 0.1s' }}
                onMouseEnter={e => e.currentTarget.style.background='var(--bg3)'}
                onMouseLeave={e => e.currentTarget.style.background=''}>
                <div style={{ width:8, height:8, borderRadius:'50%', background:statusDot(p.status), flexShrink:0 }}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{p.customer}</div>
                  <div style={{ fontSize:11, color:'var(--text2)', marginTop:2 }}>
                    {p.address} · {p.model} · {p.region}
                  </div>
                  {p.myuplink_device_id && (
                    <div style={{ fontSize:10, color:'var(--blue)', fontFamily:'var(--mono)', marginTop:2 }}>
                      ⚡ {p.myuplink_device_id}
                    </div>
                  )}
                </div>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3, flexShrink:0 }}>
                  <div style={{ fontSize:10, fontFamily:'var(--mono)', color: p.lat ? 'var(--green)' : 'var(--text3)' }}>
                    {p.lat ? '● mapped' : '○ no coords'}
                  </div>
                  <div style={{ fontSize:10, fontFamily:'var(--mono)', color:'var(--text3)' }}>{p.id}</div>
                </div>
                <button onClick={() => startEdit(p)}
                  style={{ fontSize:11, color:'var(--blue)', background:'rgba(33,118,174,0.1)',
                    border:'1px solid rgba(33,118,174,0.25)', borderRadius:6, cursor:'pointer',
                    padding:'4px 12px', flexShrink:0, fontFamily:'var(--sans)', fontWeight:600 }}>
                  Edit
                </button>
                <button onClick={() => handleDelete(p.id)}
                  style={{ fontSize:11, color:'var(--red)', background:'none', border:'none',
                    cursor:'pointer', padding:'4px 6px', flexShrink:0 }}>
                  ✕
                </button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── API Credentials Tab ──────────────────────────────────────
function ApiTab({ company, onChange }) {
  const [form, setForm] = useState({ ...company.myuplink });
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [showSecret, setShowSecret] = useState(false);
  const [saved, setSaved] = useState(false);

  const test = async () => {
    setTesting(true);
    setTestResult(null);
    await new Promise(r => setTimeout(r, 1400));
    setTestResult(company.myuplink.connected ? 'ok' : 'fail');
    setTesting(false);
  };

  const save = () => {
    onChange({ ...company, myuplink: { ...form } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="anim-in">
      <div className="card">
        <div className="card-hd">
          <span className="card-title">MyUplink OAuth2 Credentials</span>
          <span style={{ fontSize:10, fontFamily:'var(--mono)', color: company.myuplink.connected ? 'var(--green)' : 'var(--red)' }}>
            {company.myuplink.connected ? '● API connected' : '● Not connected'}

        </div>
        <div className="card-bd">

            </div>
            <div className="field">
              <label>Client Secret</label>
              <div style={{ display:'flex', gap:6 }}>
                <input type={showSecret ? 'text' : 'password'} value={form.clientSecret}
                  onChange={e => setForm(f => ({...f, clientSecret: e.target.value}))}
                  style={{ fontFamily:'var(--mono)', fontSize:12, flex:1 }}/>
                <button className="btn btn-ghost" style={{ padding:'7px 10px' }} onClick={() => setShowSecret(s => !s)}>
                  {showSecret ? '🙈' : '👁'}

          </div>
          <div className="field-group">
            <div className="field">
              <label>Redirect URI</label>

            </div>
            <div className="field">
              <label>Scopes</label>
              <input value="READSYSTEM offline_access" readOnly style={{ fontFamily:'var(--mono)', fontSize:12, opacity:0.6 }}/>

            </div>
          </div>

          {/* Test connection */}
          <div style={{ marginTop:6 }}>
            <div className="conn-test">
              <div className="conn-test-dot" style={{ background: testResult === 'ok' ? '#79D89F' : testResult === 'fail' ? '#F08A8A' : '#4a6480' }}></div>
              <span style={{ color:'var(--text2)', flex:1 }}>
                {testing ? 'Testing connection…' : testResult === 'ok' ? `Connected · Last sync ${company.myuplink.lastSync}` : testResult === 'fail' ? 'Connection failed — check credentials' : 'Not tested yet'}
              </span>
              <button className="btn btn-ghost" style={{ padding:'4px 12px', fontSize:11 }} onClick={test} disabled={testing}>
                {testing ? '…' : 'Test'}
              </button>

          <div className="save-row" style={{ marginTop:14 }}>
            <button className="btn btn-ghost">Reset</button>
            <button className="btn btn-primary" onClick={save}>{saved ? '✓ Saved' : 'Save Credentials'}</button>

        </div>
      </div>

      <div className="card">
        <div className="card-hd"><span className="card-title">Security Notes</span></div>
        <div className="card-bd">
          {[
            ['Never commit client secrets to version control.', '#F5C66B'],
            ['Rotate secrets at dev.myuplink.com if compromised.', '#F08A8A'],
            ['In production, move token exchange to a backend proxy so secrets never reach the browser.', '#6BC4D6'],

// ── Main App ─────────────────────────────────────────────────
// ── CSV Import Tab ────────────────────────────────────────────────────────────

function ImportTab() {
  const [step, setStep]         = useState(0); // 0=drop 1=map 2=preview 3=done
  const [headers, setHeaders]   = useState([]);
  const [rows, setRows]         = useState([]);
  const [fileName, setFileName] = useState('');
  const [dataType, setDataType] = useState('jobs');
  const [mapping, setMapping]   = useState({});
  const [importing, setImporting] = useState(false);
  const [result, setResult]     = useState(null);
  const [dragOver, setDragOver] = useState(false);

  // ── CSV parsing ─────────────────────────────────────────────────────────────
  function parseCSV(text) {
    // Detect separator: Minuba exports semicolons, most others use commas
    const firstLine = text.split(/\r?\n/)[0] || '';
    const sep = (firstLine.split(';').length >= firstLine.split(',').length) ? ';' : ',';
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (!lines.length) return { headers: [], rows: [] };

    function splitLine(line) {
      const cells = []; let cur = ''; let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === sep && !inQ) { cells.push(cur.trim().replace(/^"|"$/g,'')); cur = ''; }
        else { cur += ch; }
      }
      cells.push(cur.trim().replace(/^"|"$/g,''));
      return cells;
    }

    const hdrs = splitLine(lines[0]);
    const data = lines.slice(1).map(l => {
      const cells = splitLine(l);
      return Object.fromEntries(hdrs.map((h, i) => [h, cells[i] ?? '']));
    }).filter(r => Object.values(r).some(v => v.trim()));
    return { headers: hdrs, rows: data };
  }

  // ── Auto-detect data type from column names ──────────────────────────────
  function detectType(hdrs) {
    const h = hdrs.map(x => x.toLowerCase()).join(' ');
    if (/timer|hours|tid\b/.test(h))                   return 'time';
    if (/vare|material|produkt|product/.test(h))        return 'materials';
    if (/sagsnr|ordernr|ordre|order|job\b/.test(h))    return 'jobs';
    if (/kunde|client|customer|installation/.test(h))  return 'customers';
    return 'jobs';
  }

  // ── Auto-map column names to YV fields ──────────────────────────────────
  const FIELD_DEFS = {
    jobs: [
      { key:'id',          label:'Order ID',      required:false },
      { key:'customer',    label:'Customer',       required:true  },
      { key:'address',     label:'Address',        required:false },
      { key:'status',      label:'Status',         required:false },
      { key:'due',         label:'Due date',       required:false },
      { key:'type',        label:'Job type',       required:false },
      { key:'assigned',    label:'Assigned to',    required:false },
      { key:'description', label:'Description',    required:false },
      { key:'pump_id',     label:'Pump / Serial',  required:false },
    ],
    customers: [
      { key:'customer',   label:'Customer name',   required:true  },
      { key:'address',    label:'Address',         required:false },
      { key:'model',      label:'Pump model',      required:false },
      { key:'phone',      label:'Phone',           required:false },
      { key:'email',      label:'Email',           required:false },
      { key:'installed',  label:'Install date',    required:false },
      { key:'region',     label:'Region',          required:false },
    ],
    materials: [
      { key:'name',      label:'Material name',   required:true  },
      { key:'sku',       label:'SKU / Item no.',  required:false },
      { key:'qty',       label:'Quantity',        required:false },
      { key:'unit',      label:'Unit',            required:false },
      { key:'price',     label:'Unit price',      required:false },
      { key:'order_id',  label:'Order ID',        required:false },
    ],
    time: [
      { key:'date',        label:'Date',          required:true  },
      { key:'worker',      label:'Technician',    required:false },
      { key:'hours',       label:'Hours',         required:true  },
      { key:'description', label:'Description',   required:false },
      { key:'order_id',    label:'Order ID',      required:false },
    ],
  };

  const TYPE_LABELS = { jobs:'Jobs / Work orders', customers:'Customers / Pumps', materials:'Materials', time:'Time entries' };
  const TYPE_ICONS  = { jobs:'📋', customers:'🏠', materials:'🔧', time:'⏱' };

  const CANDIDATES = {
    id:          ['sagsnummer','sagsnr','ordernr','ordre nr','id','order id','sag nr'],
    customer:    ['kundenavn','kunde','customer','client','navn','name','firm'],
    address:     ['adresse','address','vejnavn','gadenavn','street'],
    status:      ['status','tilstand','state'],
    due:         ['dato','date','due','frist','deadline','planlagt','scheduled'],
    type:        ['type','opgavetype','ordertype','kategori','category'],
    assigned:    ['tildelt','assigned','medarbejder','technician','ansvarlig','employee','worker'],
    description: ['beskrivelse','description','kommentar','comment','notes','note','tekst'],
    pump_id:     ['serienummer','serial','pump id','installation nr','enheds id'],
    model:       ['model','pumpemodel','type','product'],
    phone:       ['telefon','phone','tlf','mobil','mobile','tel'],
    email:       ['email','mail','e-mail'],
    installed:   ['installationsdato','installed','install date','monteret'],
    region:      ['region','område','area','by','city'],
    name:        ['varebeskrivelse','description','material','product','vare','item'],
    sku:         ['varenummer','sku','itemnr','produktnr','item no'],
    qty:         ['antal','quantity','qty','mængde','amount'],
    unit:        ['enhed','unit','uom'],
    price:       ['enhedspris','price','pris','unitprice','unit price'],
    order_id:    ['sagsnummer','sagsnr','ordernr','ordre nr','order id'],
    date:        ['dato','date','dag','day'],
    worker:      ['medarbejder','worker','technician','ansvarlig','employee','navn'],
    hours:       ['timer','hours','tid','varighed','duration','time'],
  };

  function autoMap(hdrs, type) {
    const m = {};
    const lower = hdrs.map(h => h.toLowerCase().trim());
    for (const field of (FIELD_DEFS[type] || [])) {
      const candidates = CANDIDATES[field.key] || [];
      const match = hdrs.find((_, i) => candidates.some(c => lower[i].includes(c)));
      if (match) m[field.key] = match;
    }
    return m;
  }

  // ── File handling ───────────────────────────────────────────────────────
  function handleFile(file) {
    if (!file || !file.name.match(/\.(csv|txt)$/i)) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = e => {
      const { headers: hdrs, rows: data } = parseCSV(e.target.result);
      if (!hdrs.length) return;
      const type = detectType(hdrs);
      setHeaders(hdrs);
      setRows(data);
      setDataType(type);
      setMapping(autoMap(hdrs, type));
      setStep(1);
    };
    reader.readAsText(file, 'UTF-8');
  }

  function onDrop(e) {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    if (file) handleFile(file);
  }

  // ── Import to Supabase ──────────────────────────────────────────────────
  async function doImport() {
    setImporting(true);
    let success = 0; const errors = [];

    // Status normalisation for jobs
    const STATUS_MAP = {
      ny:'open', new:'open', aktiv:'today', active:'today', started:'today',
      afsluttet:'completed', completed:'completed', done:'completed', closed:'completed',
      udsat:'open', delayed:'open',
    };

    for (const row of rows) {
      try {
        // Build record from mapping
        const record = {};
        for (const [yvKey, csvCol] of Object.entries(mapping)) {
          if (csvCol && row[csvCol] !== undefined && row[csvCol] !== '') {
            record[yvKey] = row[csvCol].trim();
          }
        }

        if (dataType === 'jobs') {
          if (!record.customer) { errors.push(`Skipped row — no customer value`); continue; }
          if (record.status) record.status = STATUS_MAP[record.status.toLowerCase()] || 'open';
          else record.status = 'open';
          if (record.id) {
            const { error } = await YV_SB.from('work_orders').upsert({ ...record }, { onConflict: 'id' });
            if (error) throw error;
          } else {
            const { error } = await YV_SB.from('work_orders').insert(record);
            if (error) throw error;
          }
          success++;

        } else if (dataType === 'customers') {
          if (!record.customer) { errors.push(`Skipped row — no customer name`); continue; }
          record.status = record.status || 'ok';
          const { error } = await YV_SB.from('pumps').upsert(record, { onConflict: 'id' });
          if (error) throw error;
          success++;

        } else {
          // materials + time → localStorage (no Supabase table yet)
          const existing = JSON.parse(localStorage.getItem(`yv_import_${dataType}`) || '[]');
          existing.push({ ...record, _imported: new Date().toISOString() });
          localStorage.setItem(`yv_import_${dataType}`, JSON.stringify(existing));
          success++;
        }
      } catch (e) {
        errors.push(e.message || String(e));
        if (errors.length >= 5) { errors.push('…more errors truncated'); break; }
      }
    }

    setResult({ success, errors, total: rows.length });
    setImporting(false);
    setStep(3);
  }

  // ── Mapped preview rows ─────────────────────────────────────────────────
  const previewFields = FIELD_DEFS[dataType].filter(f => mapping[f.key]);
  const previewRows   = rows.slice(0, 6);

  // ── Render ──────────────────────────────────────────────────────────────
  const StepBar = () => (
    <div className="import-steps" style={{ marginBottom:24 }}>
      {['Upload','Map columns','Preview','Done'].map((label, i) => (
        <div key={i} className={`import-step ${i < step ? 'done' : i === step ? 'active' : ''}`}>
          <div className="import-step-num">{i < step ? '✓' : i + 1}</div>
          {label}
        </div>
      ))}
    </div>
  );

  // Step 0 — Drop zone
  if (step === 0) return (
    <div className="anim-in">
      <StepBar />
      <div className={`drop-zone ${dragOver ? 'drag-over' : ''}`}
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={onDrop}
        onClick={() => document.getElementById('csv-file-input').click()}>
        <div className="drop-zone-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 2v12M6 9l5-5 5 5" stroke="#6BC4D6" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M3 17v1a2 2 0 002 2h12a2 2 0 002-2v-1" stroke="var(--text3)" strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
        </div>
        <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>Drop a CSV file here</div>
        <div style={{ fontSize:12, color:'var(--text3)', marginBottom:4 }}>or click to browse</div>
        <div style={{ fontSize:11, color:'var(--text3)', fontFamily:'var(--mono)' }}>
          Supports: Minuba export (;) · Excel CSV (,) · UTF-8 or Windows-1252
        </div>
        <input id="csv-file-input" type="file" accept=".csv,.txt" style={{ display:'none' }}
          onChange={e => handleFile(e.target.files?.[0])} />
      </div>

      <div style={{ marginTop:24, display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        {Object.entries(TYPE_LABELS).map(([type, label]) => (
          <div key={type} style={{ background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px' }}>
            <div style={{ fontSize:20, marginBottom:6 }}>{TYPE_ICONS[type]}</div>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>{label}</div>
            <div style={{ fontSize:11, color:'var(--text3)' }}>
              {{
                jobs:      'Sagsnummer · Kundenavn · Adresse · Tildelt',
                customers: 'Kundenavn · Adresse · Model · Telefon',
                materials: 'Varebeskrivelse · Varenr · Antal · Pris',
                time:      'Dato · Medarbejder · Timer · Sagsnr',
              }[type]}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  // Step 1 — Column mapper
  if (step === 1) return (
    <div className="anim-in">
      <StepBar />

      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:700, marginBottom:2 }}>{fileName}</div>
          <div style={{ fontSize:11, color:'var(--text3)', fontFamily:'var(--mono)' }}>
            {rows.length} rows · {headers.length} columns detected
          </div>
        </div>
        <button onClick={() => { setStep(0); setRows([]); setHeaders([]); }}
          style={{ background:'none', border:'1px solid var(--border)', borderRadius:7, color:'var(--text3)', fontSize:12, padding:'5px 12px', cursor:'pointer' }}>
          ← Re-upload
        </button>
      </div>

      {/* Data type selector */}
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:11, fontFamily:'var(--mono)', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8 }}>Data type</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {Object.entries(TYPE_LABELS).map(([type, label]) => (
            <div key={type}
              className={`type-pill ${dataType === type ? 'selected' : 'unselected'}`}
              onClick={() => { setDataType(type); setMapping(autoMap(headers, type)); }}>
              {TYPE_ICONS[type]} {label}
            </div>
          ))}
        </div>
      </div>

      {/* Column mapper */}
      <div style={{ background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:20 }}>
        <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:11, fontFamily:'var(--mono)', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Column mapping</span>
          <span style={{ fontSize:11, color:'var(--text3)' }}>
            {Object.values(mapping).filter(Boolean).length} of {FIELD_DEFS[dataType].length} mapped
          </span>
        </div>
        <div style={{ padding:'14px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 28px 1fr', gap:'6px 8px', marginBottom:6 }}>
            <div style={{ fontSize:10, fontFamily:'var(--mono)', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.06em' }}>YV field</div>
            <div/>
            <div style={{ fontSize:10, fontFamily:'var(--mono)', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.06em' }}>CSV column</div>
          </div>
          {FIELD_DEFS[dataType].map(field => (
            <div key={field.key} className="mapper-row">
              <div style={{ fontSize:12, color:'var(--text)', fontWeight:500 }}>
                {field.label}
                {field.required && <span className="mapper-req"> *</span>}
              </div>
              <div style={{ color:'var(--text3)', fontSize:14, textAlign:'center' }}>→</div>
              <select className="mapper-select"
                value={mapping[field.key] || ''}
                onChange={e => setMapping(m => ({ ...m, [field.key]: e.target.value || undefined }))}>
                <option value="">— skip —</option>
                {headers.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}
        </div>
      </div>

      <button onClick={() => setStep(2)}
        style={{ width:'100%', padding:'11px', background:'var(--blue)', border:'none', borderRadius:8, color:'#0b1422', fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'var(--sans)' }}>
        Preview import →
      </button>
    </div>
  );

  // Step 2 — Preview
  if (step === 2) return (
    <div className="anim-in">
      <StepBar />

      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:700 }}>Preview — {TYPE_LABELS[dataType]}</div>
          <div style={{ fontSize:11, color:'var(--text3)', fontFamily:'var(--mono)', marginTop:2 }}>
            Showing first {Math.min(6, rows.length)} of {rows.length} rows
          </div>
        </div>
        <button onClick={() => setStep(1)}
          style={{ background:'none', border:'1px solid var(--border)', borderRadius:7, color:'var(--text3)', fontSize:12, padding:'5px 12px', cursor:'pointer' }}>
          ← Back
        </button>
      </div>

      <div style={{ background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:16 }}>
        <div style={{ overflowX:'auto' }}>
          <table className="preview-table">
            <thead>
              <tr>
                {previewFields.map(f => <th key={f.key}>{f.label}</th>)}
              </tr>
            </thead>
            <tbody>
              {previewRows.map((row, i) => (
                <tr key={i}>
                  {previewFields.map(f => (
                    <td key={f.key} title={row[mapping[f.key]] || ''}>
                      {row[mapping[f.key]] || <span style={{ color:'var(--text3)' }}>—</span>}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Destination info */}
      <div style={{ background:'rgba(107,196,214,0.06)', border:'1px solid rgba(107,196,214,0.2)', borderRadius:10, padding:'12px 14px', marginBottom:16, fontSize:12, color:'var(--text2)' }}>
        <span style={{ fontWeight:600, color:'var(--blue)' }}>
          {rows.length} {TYPE_LABELS[dataType].toLowerCase()}
        </span>
        {' '}will be imported to{' '}
        <span style={{ fontFamily:'var(--mono)', color:'var(--text)' }}>
          {{jobs:'work_orders', customers:'pumps', materials:'localStorage (yv_import_materials)', time:'localStorage (yv_import_time)'}[dataType]}
        </span>
        {(dataType === 'jobs' || dataType === 'customers') && ' in Supabase. Existing records with matching IDs will be updated.'}
      </div>

      <button onClick={doImport} disabled={importing}
        style={{ width:'100%', padding:'11px', background: importing ? 'var(--bg3)' : 'var(--blue)', border:'none', borderRadius:8, color: importing ? 'var(--text3)' : '#0b1422', fontWeight:700, fontSize:14, cursor: importing ? 'default' : 'pointer', fontFamily:'var(--sans)', transition:'all 0.15s' }}>
        {importing ? 'Importing…' : `Import ${rows.length} records ✓`}
      </button>
    </div>
  );

  // Step 3 — Done
  if (step === 3) return (
    <div className="anim-in" style={{ maxWidth:480 }}>
      <StepBar />

      <div style={{ textAlign:'center', padding:'24px 0' }}>
        <div style={{ width:64, height:64, borderRadius:'50%', background: result.errors.length ? 'rgba(245,198,107,0.12)' : 'rgba(121,216,159,0.12)', border:`2px solid ${result.errors.length ? 'rgba(245,198,107,0.4)' : 'rgba(121,216,159,0.4)'}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, margin:'0 auto 16px' }}>
          {result.errors.length ? '⚠' : '✓'}
        </div>
        <div style={{ fontSize:22, fontWeight:800, marginBottom:6 }}>
          {result.errors.length === 0 ? 'Import complete' : 'Import finished with warnings'}
        </div>
        <div style={{ fontSize:13, color:'var(--text2)', marginBottom:24 }}>
          <span style={{ color:'var(--green)', fontWeight:600 }}>{result.success}</span> records imported
          {result.errors.length > 0 && <>, <span style={{ color:'var(--yellow)', fontWeight:600 }}>{result.errors.length}</span> skipped</>}
          {' '}out of {result.total} total
        </div>

        {result.errors.length > 0 && (
          <div style={{ background:'rgba(245,198,107,0.06)', border:'1px solid rgba(245,198,107,0.2)', borderRadius:10, padding:'12px 14px', marginBottom:20, textAlign:'left' }}>
            <div style={{ fontSize:11, fontFamily:'var(--mono)', color:'var(--yellow)', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' }}>Skipped rows</div>
            {result.errors.map((e, i) => (
              <div key={i} style={{ fontSize:11, color:'var(--text2)', fontFamily:'var(--mono)', marginBottom:2 }}>• {e}</div>
            ))}
          </div>
        )}

        <div style={{ display:'flex', gap:8 }}>
          <button onClick={() => { setStep(0); setRows([]); setHeaders([]); setResult(null); setFileName(''); }}
            style={{ flex:1, padding:'10px', background:'var(--blue)', border:'none', borderRadius:8, color:'#0b1422', fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'var(--sans)' }}>
            Import another file
          </button>
          {(dataType === 'jobs') && (
            <button onClick={() => window.open('Tier25 Field App.html','_blank')}
              style={{ flex:1, padding:'10px', background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', fontWeight:600, fontSize:13, cursor:'pointer', fontFamily:'var(--sans)' }}>
              Open Field App →
            </button>
          )}
        </div>
      </div>
    </div>
  );

  return null;
}

function AdminApp() {
  const [pumpsVer, setPumpsVer] = useState(0);
  const [companies, setCompanies] = useState(COMPANIES_INIT);
  const [selectedId, setSelectedId] = useState('c001');
  const [tab, setTab] = useState('overview');
  const [search, setSearch] = useState('');

  useEffect(() => {
    if (window.YV) YV.onUpdate(() => setPumpsVer(v => v + 1));
  }, []);

  const company = companies.find(c => c.id === selectedId);
  const filtered = companies.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.appName.toLowerCase().includes(search.toLowerCase()));

  const updateCompany = (updated) => {
    setCompanies(cs => cs.map(c => c.id === updated.id ? updated : c));
  };

  const tabs = ['overview','pumps','branding','api','users','preview','import'];
  const tabLabels = { overview:'Overview', pumps:'Pumps', branding:'Branding', api:'API / OAuth', users:'Users', preview:'Preview', import:'Import' };

  return (
    <div className="app">
      {/* Nav */}
      <nav className="nav">
        <div className="nav-logo">
          <div className="nav-logo-mark">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1 L12 4.5 L12 11.5 L1 11.5 L1 4.5 Z" stroke="white" strokeWidth="1.3" fill="none"/><path d="M4 11.5 L4 7.5 L9 7.5 L9 11.5" stroke="white" strokeWidth="1.2" fill="none"/></svg>
          </div>
          <div className="nav-title">Yvirvaking</div>
        </div>
        <span className="nav-badge">Super Admin</span>
        <div style={{ fontSize:12, color:'var(--text3)', fontFamily:'var(--mono)', marginLeft:8 }}>
          {companies.length} tenants · {companies.reduce((s,c) => s + c.pumps, 0)} pumps
        </div>
        <div className="nav-right">
          <a href="index.html" style={{ fontSize:12, color:'var(--text3)', fontFamily:'var(--mono)', textDecoration:'none', padding:'4px 10px', border:'1px solid var(--border)', borderRadius:6 }}>← Hub</a>
          <ThemeToggle/>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginLeft:4, cursor:'pointer' }}>
            <div style={{ width:28, height:28, background:'linear-gradient(135deg,#F08A8A,#6c63ff)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, color:'white' }}>SA</div>
            <span style={{ fontSize:12, color:'var(--text2)' }}>Super Admin</span>
          </div>
        </div>
      </nav>

      <div className="body">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-head">
            <h3>Companies</h3>
            <div className="sidebar-search">
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="#4a6480" strokeWidth="1.3"/><path d="M9 9l2.5 2.5" stroke="#4a6480" strokeWidth="1.3" strokeLinecap="round"/></svg>
              <input placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)}/>
            </div>
          </div>

          <div className="sidebar-list">
            {filtered.map(c => (
              <div key={c.id} className={`company-item ${c.id === selectedId ? 'active' : ''}`}
                onClick={() => { setSelectedId(c.id); setTab('overview'); }}>
                <div className="company-logo" style={{ background: c.color, fontSize:16 }}>{c.logoEmoji}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div className="company-name">{c.appName}</div>
                  <div className="company-meta">{c.name} · {c.pumps} pumps</div>
                </div>
                <div className="company-status" style={{ background: c.myuplink.connected ? '#79D89F' : '#4a6480' }}></div>
              </div>
            ))}
          </div>

          <div className="sidebar-footer">
            <button className="add-btn">
              <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 2v9M2 6.5h9" stroke="#6BC4D6" strokeWidth="1.5" strokeLinecap="round"/></svg>
              Add Company
            </button>
            <div style={{ marginTop:10, padding:'8px 10px', background:'var(--bg3)', borderRadius:7, fontSize:10, fontFamily:'var(--mono)', color:'var(--text3)', lineHeight:1.6 }}>
              <div style={{ color:'var(--green)', marginBottom:2 }}>● Platform healthy</div>
              <div>v1.0 · {companies.reduce((s,c) => s + c.pumps, 0)} pumps total</div>
            </div>
          </div>
        </div>

        {/* Main */}
        <div className="main">
          {/* Company header */}
          <div style={{ padding:'14px 20px 0', background:'var(--bg2)', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
              <div style={{ width:38, height:38, borderRadius:10, background:company.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>{company.logoEmoji}</div>
              <div>
                <div style={{ fontSize:16, fontWeight:700 }}>{company.name}</div>
                <div style={{ fontSize:11, fontFamily:'var(--mono)', color:'var(--text3)' }}>
                  {company.appName} · {company.domain}.yvirvaking.fo · {company.pumps} pumps ·
                  <span style={{ color: company.status === 'active' ? '#79D89F' : '#F5C66B', marginLeft:4 }}>
                    {company.status.charAt(0).toUpperCase() + company.status.slice(1)}
                  </span>
                </div>
              </div>
              <div style={{ marginLeft:'auto', display:'flex', gap:8 }}>
                <button className="btn btn-ghost" style={{ fontSize:11, padding:'5px 12px' }}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ display:'inline', marginRight:4, verticalAlign:'middle' }}><path d="M6 1v5M6 6l2.5-2.5M6 6L3.5 3.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/><path d="M2 8v1.5a.5.5 0 00.5.5h7a.5.5 0 00.5-.5V8" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                  Export Config
                </button>
                <button className="btn btn-danger" style={{ fontSize:11, padding:'5px 12px' }}>Suspend</button>
              </div>
            </div>

            <div className="tabs">
              {tabs.map(t => (
                <div key={t} className={`tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                  {tabLabels[t]}
                </div>
              ))}
            </div>
          </div>

          <div className="content">
            {tab === 'overview'  && <OverviewTab company={company}/>}
            {tab === 'pumps'     && <PumpsTab company={company}/>}
            {tab === 'branding'  && <BrandingTab company={company} onChange={updateCompany}/>}
            {tab === 'api'       && <ApiTab company={company} onChange={updateCompany}/>}
            {tab === 'users'     && <UsersTab company={company}/>}
            {tab === 'preview'   && <PreviewTab company={company}/>}
            {tab === 'import'    && <ImportTab/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp/>);
</script>
</body>
