<style>
/* Leaflet map dark/light theming */
.leaflet-container { background: var(--bg2) !important; font-family: var(--sans); }
.leaflet-control-zoom a { background: var(--bg3) !important; color: var(--text) !important; border-color: var(--border) !important; }
.leaflet-control-zoom a:hover { background: var(--bg4) !important; }
.leaflet-control-attribution { background: rgba(0,0,0,0.4) !important; color: var(--text3) !important; font-size: 9px !important; }
.leaflet-tile-pane { filter: var(--map-filter, none); }
[data-theme="dark"]  .leaflet-tile-pane { --map-filter: brightness(1.28) contrast(1.05) saturate(0.75); }
[data-theme="light"] .leaflet-tile-pane { --map-filter: brightness(1.08) contrast(3.5) saturate(0.25); }

/* Single ring expands to 2× the dot size and fades — scales from its own center */
@keyframes ripple {
  0%   { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(2); opacity: 0; }
}
.pump-ripple {
  animation: ripple 2.2s ease-out infinite;
  transform-box: fill-box;
  transform-origin: center;
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1520;
    --bg2: #132030;
    --bg3: #1a2d42;
    --bg4: #213550;
    --border: #2a3f58;
    --text: #eef2f7;
    --text2: #7f9ab5;
    --text3: #4a6480;
    --red: #F08A8A;
    --blue: #6BC4D6;
    --yellow: #F5C66B;
    --green: #79D89F;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Outfit', sans-serif;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
  #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Pulsing map pin */
  @keyframes pulse-ring {
    0% { transform: scale(0.9); opacity: 0.5; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .anim-in { animation: fadeIn 0.3s ease forwards; }

  .nav { height: 54px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0; flex-shrink: 0; padding: 0 20px; z-index: 50; }
  .nav-logo { display: flex; align-items: center; gap: 10px; margin-right: 32px; }
  .nav-logo-mark { width: 30px; height: 30px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .nav-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .nav-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }  .nav-links { display: flex; gap: 2px; margin-right: auto; }
  .nav-link { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border: none; background: none; transition: all 0.15s; }
  .nav-link:hover { color: var(--text); background: var(--bg3); }
  .nav-link.active { color: var(--text); background: var(--bg3); }
  .nav-search { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 32px; margin-right: 12px; }
  .nav-search input { background: none; border: none; color: var(--text); font-family: var(--sans); font-size: 13px; width: 180px; outline: none; }
  .nav-search input::placeholder { color: var(--text3); }
  .nav-alerts { position: relative; width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .nav-alerts-badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: white; font-size: 9px; font-weight: 700; font-family: var(--mono); border-radius: 999px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
  .nav-user { display: flex; align-items: center; gap: 8px; margin-left: 12px; cursor: pointer; }
  .nav-avatar { width: 30px; height: 30px; background: linear-gradient(135deg, var(--blue), #6c63ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
  .nav-user-name { font-size: 12px; font-weight: 500; color: var(--text2); }

  .main { flex: 1; display: flex; overflow: hidden; }
  .map-area { flex: 1; position: relative; background: var(--bg); overflow: visible; }
  .right-panel { width: 340px; flex-shrink: 0; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat-item { flex: 1; padding: 14px 16px; border-right: 1px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.03em; line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; font-family: var(--mono); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }
  .stat-val.green { color: var(--green); }
  .stat-val.blue { color: var(--blue); }

  /* Alert list */
  .panel-section { flex-shrink: 0; }
  .panel-header { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .panel-header h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-family: var(--mono); }
  .panel-header span { font-size: 10px; color: var(--text3); font-family: var(--mono); cursor: pointer; }
  .panel-header span:hover { color: var(--blue); }
  .panel-scroll { overflow-y: auto; }

  .alert-row { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; display: flex; gap: 10px; align-items: flex-start; }
  .alert-row:hover { background: var(--bg3); }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .alert-content { flex: 1; min-width: 0; }
  .alert-id { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .alert-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alert-msg { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .alert-time { font-size: 10px; font-family: var(--mono); color: var(--text3); flex-shrink: 0; margin-top: 4px; }

  /* Energy chart */
  .chart-wrap { padding: 14px 16px; }
  .chart-title { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* Map controls */
  .map-controls { position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
  .map-btn { width: 32px; height: 32px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.12s; }
  .map-btn:hover { background: var(--bg3); color: var(--text); }
  .map-legend { position: absolute; bottom: 16px; left: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; z-index: 10; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Filter chips */
  .filter-bar { position: absolute; top: 16px; left: 60px; display: flex; gap: 6px; z-index: 10; }
  .chip { padding: 5px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.12s; font-family: var(--mono); }
  .chip:hover { border-color: var(--blue); color: var(--blue); }
  .chip.active { background: var(--blue); border-color: var(--blue); color: white; }
  .chip.fault { }
  .chip.fault.active { background: var(--red); border-color: var(--red); }

  /* Pump tooltip */
  .pump-tooltip { position: absolute; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; pointer-events: none; z-index: 30; width: 220px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .pump-tooltip h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .pump-tooltip .addr { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .pump-tt-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .pump-tt-key { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .pump-tt-val { font-size: 10px; color: var(--text); font-family: var(--mono); font-weight: 500; }
  .pump-tt-btn { margin-top: 10px; width: 100%; padding: 6px; background: var(--blue); border: none; border-radius: 6px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); pointer-events: all; }

  .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; font-family: var(--mono); }
  .status-badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-badge.warning { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-badge.fault { background: rgba(230,57,70,0.15); color: var(--red); }

  /* Recent pumps */
  .recent-row { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; cursor: pointer; transition: background 0.12s; }
  .recent-row:hover { background: var(--bg3); }
  .recent-icon { width: 28px; height: 28px; background: var(--bg3); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .recent-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .recent-date { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .recent-cop { font-size: 12px; font-family: var(--mono); color: var(--blue); font-weight: 600; margin-left: auto; }

</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

function useLang() {
  const [lang, setLang] = useState(I18n.getLang());
  useEffect(() => {
    const h = () => setLang(I18n.getLang());
    document.addEventListener('yv:langchange', h);
    return () => document.removeEventListener('yv:langchange', h);
  }, []);
  return lang;
}

function LangToggle() {
  const lang = useLang();
  const cycle = () => { const l=['en','da','sv']; I18n.setLang(l[(l.indexOf(lang)+1)%l.length]); };
  return (
    <button onClick={cycle} title="Switch language" style={{
      display:'flex', alignItems:'center', gap:5, padding:'4px 10px',
      borderRadius:6, border:'1px solid var(--border)', background:'transparent',
      color:'var(--text2)', fontSize:11, fontFamily:'var(--mono)', cursor:'pointer'
    }}>{lang.toUpperCase()}</button>
  );
}
const pumps = YV.pumps;
const statusColor = YV.statusColor;
const statusLabel = YV.statusLabel;

// SVG Icon components
const Icon = ({ name, size = 14, color = 'currentColor' }) => {
  const icons = {
    search: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke={color} strokeWidth="1.5"/><path d="M10 10l3 3" stroke={color} strokeWidth="1.5" strokeLinecap="round"/></svg>,
    bell: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 00-4 4v3l-1 1.5h10L12 9V6a4 4 0 00-4-4z" stroke={color} strokeWidth="1.4"/><path d="M6.5 13a1.5 1.5 0 003 0" stroke={color} strokeWidth="1.4" strokeLinecap="round"/></svg>,
    pump: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="3" y="6" width="10" height="7" rx="1.5" stroke={color} strokeWidth="1.4"/><path d="M5 6V5a3 3 0 016 0v1" stroke={color} strokeWidth="1.4"/><circle cx="8" cy="9.5" r="1.5" fill={color}/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></svg>,
    minus: <svg width={size} height={size} viewBox="0 0 16 16"><path d="M3 8h10" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></svg>,
    target: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke={color} strokeWidth="1.4"/><circle cx="8" cy="8" r="2" fill={color}/><path d="M8 2v2M8 12v2M2 8h2M12 8h2" stroke={color} strokeWidth="1.4" strokeLinecap="round"/></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    wrench: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M10.5 2.5a3 3 0 00-3 3c0 .4.07.77.2 1.12L3 11.3a1.2 1.2 0 001.7 1.7l4.68-4.7c.35.13.72.2 1.12.2a3 3 0 000-6z" stroke={color} strokeWidth="1.4"/></svg>,
  };
  return icons[name] || null;
};

// Mini sparkline
const Sparkline = ({ data, color, width = 80, height = 28 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.8"/>
    </svg>
  );
};

// Bar chart for energy trend
const EnergyChart = ({ data }) => {
  const maxConsumption = Math.max(...data.map(d => d.consumption));
  return (
    <div className="chart-wrap">
      <div className="chart-title">{T('chart.title')}</div>
      <svg width="100%" height="80" viewBox="0 0 308 80" preserveAspectRatio="none">
        {data.map((d, i) => {
          const barH = (d.consumption / maxConsumption) * 58;
          const x = i * 44 + 2;
          const isLast = i === data.length - 1;
          return (
            <g key={d.month}>
              <rect x={x} y={62 - barH} width={38} height={barH} rx="3"
                fill={isLast ? 'rgba(58,134,255,0.4)' : 'rgba(58,134,255,0.18)'}
                stroke={isLast ? 'rgba(58,134,255,0.8)' : 'rgba(58,134,255,0.3)'} strokeWidth="1"/>
              <text x={x + 19} y={78} textAnchor="middle" fontSize="8" fill="#4a6480" fontFamily="JetBrains Mono">{d.month}</text>
            </g>
          );
        })}
        {/* COP line */}
        {(() => {
          const copMax = 4.2, copMin = 2.5;
          const pts = data.map((d, i) => {
            const x = i * 44 + 21;
            const y = 62 - ((d.avg_cop - copMin) / (copMax - copMin)) * 55;
            return `${x},${y}`;
          }).join(' ');
          return <polyline points={pts} fill="none" stroke="#79D89F" strokeWidth="1.5" strokeDasharray="3,2" opacity="0.7"/>;
        })()}
      </svg>
      <div style={{ display: 'flex', gap: 14, marginTop: 4 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 10, height: 10, borderRadius: 2, background: 'rgba(58,134,255,0.4)', border: '1px solid rgba(58,134,255,0.6)' }}></div>
          <span style={{ fontSize: 9, color: '#4a6480', fontFamily: 'JetBrains Mono' }}>kWh</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 10, height: 2, background: '#79D89F', borderRadius: 1 }}></div>
          <span style={{ fontSize: 9, color: '#4a6480', fontFamily: 'JetBrains Mono' }}>COP</span>
        </div>
      </div>
    </div>
  );
};

// Faroe Islands Map
const FaroeMap = ({ pumps, pumpsVer, filter, onFilterChange, onPumpClick, hoveredPump, setHoveredPump }) => {
  const mapDivRef   = useRef(null);
  const mapRef      = useRef(null);
  const markersRef  = useRef({});
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

  const filteredPumps = filter === 'all' ? pumps : pumps.filter(p => p.status === filter);

  // Init map once
  useEffect(() => {
    if (mapRef.current || !mapDivRef.current) return;
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const tileUrl = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    const map = L.map(mapDivRef.current, {
      center: [62.05, -7.0], zoom: 9,
      zoomControl: true, attributionControl: true,
    });
    L.tileLayer(tileUrl, {
      attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://openstreetmap.org">OSM</a>',
      subdomains: 'abcd', maxZoom: 18,
    }).addTo(map);

    mapRef.current = map;

    // Leaflet needs the container to be visible before it knows its dimensions
    requestAnimationFrame(() => map.invalidateSize());

    // Swap tiles when theme changes
    const observer = new MutationObserver(() => {
      const dark = document.documentElement.getAttribute('data-theme') !== 'light';
      const url  = dark
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
      map.eachLayer(l => { if (l._url) map.removeLayer(l); });
      L.tileLayer(url, { attribution: '© CARTO © OSM', subdomains: 'abcd', maxZoom: 18 }).addTo(map);
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    return () => { observer.disconnect(); map.remove(); mapRef.current = null; };
  }, []);

  // Update markers when pumps/filter changes
  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};

    filteredPumps.forEach(pump => {
      if (!pump.lat || !pump.lng) return;
      const col     = statusColor[pump.status];
      const isPulse = pump.status !== 'ok';

      const isLive = !!pump._live;

      // Two staggered ripple rings for faults/warnings — water ring effect
      if (isPulse) {
        const r1 = L.circleMarker([pump.lat, pump.lng], {
          radius: 9, fillColor: 'transparent', color: col,
          weight: 1.2, fillOpacity: 0, opacity: 1,
          className: 'pump-ripple', interactive: false,
        }).addTo(map);
        markersRef.current[pump.id + '_r1'] = r1;
      }

      // Live pump: solid, slightly larger, white ring
      // Mock pump: faded, smaller, thin border
      const marker = L.circleMarker([pump.lat, pump.lng], {
        radius:      isLive ? 10 : 8,
        fillColor:   col,
        fillOpacity: isLive ? 1.0 : 0.82,
        color:       'rgba(255,255,255,0.7)',
        weight:      isLive ? 2.5 : 1.5,
        className:   '',
      }).addTo(map);

      // Extra blue halo ring for the live pump to make it stand out
      if (isLive) {
        const halo = L.circleMarker([pump.lat, pump.lng], {
          radius: 13, fillColor: 'transparent', color: '#6BC4D6',
          weight: 1.5, fillOpacity: 0, opacity: 0.6,
          interactive: false,
        }).addTo(map);
        markersRef.current[pump.id + '_halo'] = halo;
      }

      marker.on('click', () => onPumpClick(pump));
      marker.on('mouseover', (e) => {
        const containerPt = map.latLngToContainerPoint(marker.getLatLng());
        const rect = mapDivRef.current.getBoundingClientRect();
        setTooltipPos({
          x: Math.min(containerPt.x + 14, rect.width - 240),
          y: Math.max(containerPt.y - 90, 8),
        });
        setHoveredPump(pump);
        marker.setStyle({ radius: 10 });
      });
      marker.on('mouseout', () => { setHoveredPump(null); marker.setStyle({ radius: 7 }); });

      markersRef.current[pump.id] = marker;
    });
  }, [filteredPumps, pumpsVer]);

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <div ref={mapDivRef} style={{ width: '100%', height: '100%' }} />

      {/* Filter chips */}
      <div className="filter-bar" style={{ left: 68 }}>
        {['all','ok','warning','fault'].map(f => (
          <div key={f} className={`chip ${f === 'fault' ? 'fault' : ''} ${filter === f ? 'active' : ''}`}
            onClick={() => onFilterChange(f)}>
            {f === 'all' ? T('map.allpumps') : `● ${T('status.'+f)}`}
          </div>
        ))}
      </div>

      {/* Legend */}
      <div className="map-legend">
        {['ok','warning','fault'].map(s => (
          <div key={s} className="legend-row">
            <div className="legend-dot" style={{ background: statusColor[s] }}></div>
            <span>{T('status.'+s)}</span>
          </div>
        ))}
        <div style={{ borderTop: '1px solid var(--border)', margin: '6px 0' }}></div>
        <div style={{ fontSize: 10, color: 'var(--text3)', fontFamily: 'JetBrains Mono' }}>{filteredPumps.length} pumps shown</div>
      </div>

      {/* Hover tooltip */}
      {hoveredPump && (
        <div className="pump-tooltip anim-in" style={{ left: tooltipPos.x, top: tooltipPos.y }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <h4 style={{ margin: 0 }}>{hoveredPump.customer}</h4>
                {hoveredPump._live
                  ? <span style={{ fontSize:9, fontFamily:'var(--mono)', fontWeight:700, color:'#79D89F', background:'rgba(30,158,94,0.12)', border:'1px solid rgba(30,158,94,0.3)', borderRadius:3, padding:'1px 5px' }}>● LIVE</span>
                  : <span style={{ fontSize:9, fontFamily:'var(--mono)', color:'var(--text3)', background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:3, padding:'1px 5px' }}>DEMO</span>
                }
              </div>
              <div className="addr">{hoveredPump.address}</div>
            </div>
            <span className={`status-badge ${hoveredPump.status}`}>{statusLabel[hoveredPump.status]}</span>
          </div>
          {[
            ['Model',   hoveredPump.model.replace('CTC ','')],
            ['Indoor',  `${hoveredPump.temp_indoor}°C`],
            ['Outdoor', `${hoveredPump.temp_outdoor}°C`],
            ['COP',     hoveredPump.cop > 0 ? hoveredPump.cop.toFixed(1) : 'N/A'],
            ['Today',   `${hoveredPump.energy_today} kWh`],
            ['Seen',    hoveredPump.last_seen],
          ].map(([k, v]) => (
            <div className="pump-tt-row" key={k}><span className="pump-tt-key">{k}</span><span className="pump-tt-val">{v}</span></div>
          ))}
          {hoveredPump.alerts.length > 0 && (
            <div style={{ marginTop: 8, background: 'rgba(192,57,43,0.1)', borderRadius: 5, padding: '4px 8px', fontSize: 10, color: 'var(--red)', fontFamily: 'JetBrains Mono' }}>
              {hoveredPump.alerts[0]}
            </div>
          )}
          <button className="pump-tt-btn" onClick={() => onPumpClick(hoveredPump)}>Open Service View →</button>
        </div>
      )}
    </div>
  );
};

function ThemeToggle() {
  const [mode, setMode] = React.useState(window.Theme ? Theme.getMode() : 'system');
  const icons = { dark: '🌙', light: '☀️', system: '⚙' };
  const cycle = () => { Theme.cycle(); setMode(Theme.getMode()); };
  return (
    <button onClick={cycle} title="Toggle theme" style={{
      display:'flex', alignItems:'center', gap:5, padding:'4px 10px',
      borderRadius:6, border:'1px solid var(--border)', background:'transparent',
      color:'var(--text2)', fontSize:11, fontFamily:'var(--mono)', cursor:'pointer'
    }}>
      <span>{icons[mode]}</span><span>{mode.charAt(0).toUpperCase()+mode.slice(1)}</span>
    </button>
  );
}

// Main Dashboard App
function Dashboard() {
  useLang();
  const [view, setView] = useState('dashboard'); // 'dashboard' | 'customers'
  const [filter, setFilter] = useState('all');
  const [hoveredPump, setHoveredPump] = useState(null);
  const [search, setSearch] = useState('');
  const [alertDelay, setAlertDelay] = useState(() => {
    try { const v = localStorage.getItem('yv_alert_delay'); return v !== null ? Number(v) : 30; } catch { return 30; }
  }); // minutes before customer sees fault
  const [showDelaySettings, setShowDelaySettings] = useState(false);
  const [suppressedAlerts, setSuppressedAlerts] = useState(new Set());
  const [liveAlarmMap, setLiveAlarmMap] = useState({}); // pumpId -> { mins, message }
  const [alarmsLive, setAlarmsLive] = useState(false);
  const [pumpsVer, setPumpsVer] = useState(0); // increments when loadLive() updates pump data
  const [myuplinkAuth, setMyuplinkAuth] = useState(false);

  // Fallback mock timing when no live alarm matches
  const mockDetectedMins = { P005: 52, P009: 360, P003: 18, P007: 95, P012: 200, P015: 65 };

  // Re-render when live pump data arrives
  useEffect(() => {
    YV.onUpdate(() => setPumpsVer(v => v + 1));
  }, []);

  // Load real pump data from MyUplink, then sync notifications
  useEffect(() => {
    if (!window.MyUplink) return;
    MyUplink.init().then(async () => {
      const authed = MyUplink.isAuthenticated();
      setMyuplinkAuth(authed);
      if (!authed) return;
      await YV.loadLive();
      const livePumps = YV.pumps.filter(p => p._live);
      console.log(`[YV] Loaded ${livePumps.length} live pump(s):`, livePumps.map(p => `${p.id} (${p.serial || p.myuplink_device_id})`));
      if (window.YV_NOTIFY) YV_NOTIFY.syncFromPumps(YV.pumps);
    });
  }, []);

  // Auto-push notifications for faults/warnings on mount (mock fallback)
  useEffect(() => {
    if (window.YV_NOTIFY) YV_NOTIFY.syncFromPumps(YV.pumps);
  }, []);

  // Persist alert delay across reloads
  useEffect(() => {
    try { localStorage.setItem('yv_alert_delay', alertDelay); } catch {}
  }, [alertDelay]);

  // Fetch live alarms from MyUplink, map onto YV.pumps by deviceId
  useEffect(() => {
    if (!window.MyUplink) return;
    MyUplink.init();

    const load = async () => {
      if (!MyUplink.isAuthenticated()) return;
      try {
        const systems = await MyUplink.getSystems();
        const map = {};
        for (const sys of systems) {
          const alarms = await MyUplink.getAlarms(sys.systemId);
          const list = Array.isArray(alarms) ? alarms : (alarms.notifications || alarms.alarms || []);
          for (const alarm of list) {
            const pump = YV.pumps.find(p => p.myuplink_device_id === alarm.deviceId);
            if (!pump) continue;
            const detectedMins = Math.round((Date.now() - new Date(alarm.createdDatetime)) / 60000);
            // Keep the oldest (largest) mins so the delay window is accurate
            if (!map[pump.id] || detectedMins > map[pump.id].mins) {
              map[pump.id] = { mins: detectedMins, message: alarm.header || alarm.description || 'Active alarm' };
            }
          }
        }
        setLiveAlarmMap(map);
        setAlarmsLive(true);
      } catch(e) {
        console.warn('[Tier1] Live alarm fetch failed, using mock data', e);
      }
    };

    load();
    const interval = setInterval(load, 5 * 60 * 1000); // refresh every 5 min
    return () => clearInterval(interval);
  }, []);

  const getAlertState = (pump) => {
    const live = liveAlarmMap[pump.id];
    const mins = live ? live.mins : mockDetectedMins[pump.id];
    if (mins == null) return null;
    const customerNotified = mins >= alertDelay;
    const suppressed = suppressedAlerts.has(pump.id);
    return { mins, customerNotified, suppressed, windowOpen: !customerNotified && !suppressed, isLive: !!live };
  };

  const alertPumps = pumps.filter(p => p.status === 'fault' || p.status === 'warning')
    .sort((a, b) => (a.status === 'fault' ? -1 : 1));

  const pendingAlerts = alertPumps.filter(p => {
    const s = getAlertState(p);
    return s && s.windowOpen;
  });

  const recentPumps = [...pumps].sort((a, b) => new Date(b.installed) - new Date(a.installed)).slice(0, 3);

  const handlePumpClick = (pump) => {
    window.location.href = `Tier2 Service.html?pump=${pump.id}`;
  };

  return (
    <div id="root" style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      {/* Navigation */}
      <nav className="nav">
        <div className="nav-logo">
          <div className="nav-logo-mark">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2 L14 6 L14 14 L2 14 L2 6 Z" stroke="white" strokeWidth="1.5" fill="none"/>
              <path d="M5 14 L5 9 L11 9 L11 14" stroke="white" strokeWidth="1.3" fill="none"/>
              <circle cx="8" cy="6" r="1.5" fill="white"/>
            </svg>
          </div>
          <div>
            <div className="nav-title">Yvirvaking</div>
            <div className="nav-sub">Maria Poulsen · Admin</div>
          </div>
        </div>
        <div className="nav-links">
          <button className={`nav-link ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}>{T('nav.dashboard')}</button>
          <button className="nav-link" onClick={() => window.location.href='Tier2%20Service.html'}>{T('nav.fleet')}</button>
          <button className="nav-link" onClick={() => window.location.href='Tier2%20Service.html'}>{T('nav.workorders')}</button>
          <button className="nav-link" onClick={() => window.location.href='Tier2%20Service.html'}>{T('nav.reports')}</button>
          <button className={`nav-link ${view==='customers'?'active':''}`} onClick={()=>setView('customers')}>{T('nav.customers')}</button>
        </div>
        <div className="nav-search">
          <Icon name="search" size={13} color="#4a6480"/>
          <input placeholder={T('nav.search')} value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
        <div className="nav-alerts">
          <Icon name="bell" size={14} color="#7f9ab5"/>
          <div className="nav-alerts-badge">6</div>
        </div>
        {myuplinkAuth
          ? <span style={{fontSize:10,fontFamily:'var(--mono)',fontWeight:600,color:'#79D89F',background:'rgba(30,158,94,0.12)',border:'1px solid rgba(30,158,94,0.3)',borderRadius:5,padding:'3px 8px',whiteSpace:'nowrap'}}>● MyUplink</span>
          : <button onClick={() => { try { MyUplink.login(); } catch(e) { alert('MyUplink error: ' + e.message); } }} style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--yellow)',background:'rgba(232,160,32,0.1)',border:'1px solid rgba(232,160,32,0.35)',borderRadius:5,padding:'3px 8px',cursor:'pointer',whiteSpace:'nowrap'}}>Connect MyUplink</button>
        }
        <LangToggle />
        <ThemeToggle />
        <div className="nav-user">
          <div className="nav-avatar">MP</div>
          <div className="nav-user-name">Maria P.</div>
        </div>
      </nav>

      {/* Main content */}
      <div className="main">
        {view === 'customers'
          ? <CustomersView pumps={pumps} onViewOnMap={p => { setView('dashboard'); setHoveredPump(p); }} />
          : <div className="map-area">
              <FaroeMap
                pumps={pumps}
                pumpsVer={pumpsVer}
                filter={filter}
                onFilterChange={setFilter}
                onPumpClick={handlePumpClick}
                hoveredPump={hoveredPump}
                setHoveredPump={setHoveredPump}
              />
            </div>
        }

        {/* Right panel — hidden in customers view */}
        <div className="right-panel" style={{ display: view==='customers' ? 'none' : '' }}>
          {/* Stats */}
          <div className="stats-bar">
            <div className="stat-item">
              <div className="stat-val">{YV.stats.total}</div>
              <div className="stat-lbl">{T('stat.total')}</div>
            </div>
            <div className="stat-item">
              <div className="stat-val red">{YV.stats.faults}</div>
              <div className="stat-lbl">{T('stat.faults')}</div>
            </div>
            <div className="stat-item">
              <div className="stat-val yellow">{YV.stats.warnings}</div>
              <div className="stat-lbl">{T('stat.warnings')}</div>
            </div>
            <div className="stat-item">
              <div className="stat-val blue">{YV.stats.avg_cop}</div>
              <div className="stat-lbl">{T('stat.avgcop')}</div>
            </div>
          </div>

          {/* Alerts */}
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            <div className="panel-header">
              <h3>
                Active Alerts
                {alarmsLive
                  ? <span style={{ marginLeft: 6, fontSize: 9, fontFamily: 'var(--mono)', background: 'rgba(30,158,94,0.15)', color: 'var(--green)', padding: '1px 5px', borderRadius: 3, verticalAlign: 'middle' }}>● live</span>
                  : <span style={{ marginLeft: 6, fontSize: 9, fontFamily: 'var(--mono)', color: 'var(--text3)', verticalAlign: 'middle' }}>mock</span>
                }
              </h3>
              <span onClick={() => setShowDelaySettings(s => !s)}>⏱ {T('alerts.delay', {n: alertDelay})}</span>
            </div>

            {/* Alert delay settings panel */}
            {showDelaySettings && (
              <div style={{ background: '#1a2030', borderBottom: '1px solid #2a3f58', padding: '10px 16px' }} className="anim-in">
                <div style={{ fontSize: 11, color: '#7f9ab5', marginBottom: 8, lineHeight: 1.5 }}>
                  {T('alerts.delayexplain', {n: alertDelay})}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <input type="range" min="0" max="120" step="5" value={alertDelay}
                    onChange={e => setAlertDelay(Number(e.target.value))}
                    style={{ flex: 1, accentColor: '#6BC4D6' }}/>
                  <span style={{ fontSize: 12, fontFamily: 'JetBrains Mono', color: '#6BC4D6', minWidth: 36 }}>{alertDelay}m</span>
                </div>
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {[0, 15, 30, 60, 120].map(v => (
                    <button key={v} onClick={() => setAlertDelay(v)}
                      style={{ padding: '3px 8px', borderRadius: 5, fontSize: 10, fontFamily: 'JetBrains Mono', cursor: 'pointer', border: '1px solid', background: alertDelay === v ? '#6BC4D6' : 'transparent', borderColor: alertDelay === v ? '#6BC4D6' : '#2a3f58', color: alertDelay === v ? '#0b1422' : '#4a6480' }}>

            {/* Intervention window banner */}
            {pendingAlerts.length > 0 && (
              <div style={{ background: 'rgba(245,158,11,0.08)', borderBottom: '1px solid rgba(245,158,11,0.2)', padding: '8px 16px', display: 'flex', gap: 8, alignItems: 'center' }} className="anim-in">
                <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#F5C66B', flexShrink: 0, animation: 'pulse-ring 1.5s ease infinite' }}></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: '#F5C66B' }}>{T('alerts.window.title')}</div>
                  <div style={{ fontSize: 10, color: '#7f9ab5', fontFamily: 'JetBrains Mono' }}>{T(pendingAlerts.length > 1 ? 'alerts.window.sub_plural' : 'alerts.window.sub', {n: pendingAlerts.length})}</div>
                </div>
              </div>
            )}

            <div className="panel-scroll" style={{ flex: 1, maxHeight: 260, minHeight: 0 }}>
              {alertPumps.map(pump => {
                const alertState = getAlertState(pump);
                const isWindowed = alertState && alertState.windowOpen;
                const isNotified = alertState && alertState.customerNotified;
                return (
                  <div key={pump.id} className="alert-row" onClick={() => handlePumpClick(pump)}
                    style={{ borderLeft: isWindowed ? '2px solid #F5C66B' : '2px solid transparent' }}>
                    <div className="alert-dot" style={{ background: statusColor[pump.status] }}></div>
                    <div className="alert-content">
                      <div className="alert-id" style={{display:'flex',alignItems:'center',gap:5}}>
                        {pump.id} · {pump.region}
                        {pump._live
                          ? <span style={{fontSize:8,fontFamily:'var(--mono)',fontWeight:700,color:'#79D89F',background:'rgba(30,158,94,0.12)',border:'1px solid rgba(30,158,94,0.25)',borderRadius:2,padding:'0 4px'}}>LIVE</span>
                          : <span style={{fontSize:8,fontFamily:'var(--mono)',color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:2,padding:'0 4px'}}>DEMO</span>
                        }
                      </div>
                      <div className="alert-name">{pump.customer}</div>
                      <div className="alert-msg">{(alertState && liveAlarmMap[pump.id]) ? liveAlarmMap[pump.id].message : pump.alerts[0]}</div>
                      {alertState && (
                        <div style={{ marginTop: 3, display: 'flex', gap: 5, alignItems: 'center' }}>
                          {isWindowed && (
                            <span style={{ fontSize: 9, fontFamily: 'JetBrains Mono', background: 'rgba(245,158,11,0.15)', color: '#F5C66B', padding: '1px 5px', borderRadius: 3 }}>
                              {T('alerts.notifiedin', {n: alertDelay - alertState.mins})}
                            </span>
                          )}
                          {isNotified && (
                            <span style={{ fontSize: 9, fontFamily: 'JetBrains Mono', background: 'rgba(230,57,70,0.1)', color: '#F08A8A', padding: '1px 5px', borderRadius: 3 }}>
                              {T('alerts.notified')}
                            </span>
                          )}
                          {isWindowed && (
                            <span style={{ fontSize: 9, fontFamily: 'JetBrains Mono', background: 'rgba(58,134,255,0.1)', color: '#6BC4D6', padding: '1px 5px', borderRadius: 3, cursor: 'pointer' }}
                              onClick={e => { e.stopPropagation(); setSuppressedAlerts(s => new Set([...s, pump.id])); }}>
                              {T('alerts.suppress')}
                            </span>
                          )}
                        </div>
                      )}
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
                      <div className="alert-time">{pump.last_seen}</div>
                      <Icon name="arrow" size={12} color="#4a6480"/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Energy chart — hidden on mobile */}
            <div className="energy-chart-wrap" style={{ borderTop: '1px solid #2a3f58' }}>
              <EnergyChart data={YV.energyTrend}/>
            </div>

            {/* Recently installed */}
            <div style={{ borderTop: '1px solid #2a3f58' }}>
              <div className="panel-header">
                <h3>{T('recent.title')}</h3>
              </div>
              {recentPumps.map(pump => (
                <div key={pump.id} className="recent-row" onClick={() => handlePumpClick(pump)}>
                  <div className="recent-icon">
                    <Icon name="pump" size={12} color="#6BC4D6"/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      <div className="recent-name">{pump.customer}</div>
                      {pump._live
                        ? <span style={{fontSize:8,fontFamily:'var(--mono)',fontWeight:700,color:'#79D89F',background:'rgba(30,158,94,0.12)',border:'1px solid rgba(30,158,94,0.25)',borderRadius:2,padding:'0 4px'}}>LIVE</span>
                        : <span style={{fontSize:8,fontFamily:'var(--mono)',color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:2,padding:'0 4px'}}>DEMO</span>
                      }
                    </div>
                    <div className="recent-date">{pump.model.replace('CTC ','')} · {pump.installed}</div>
                  </div>
                  <div className="recent-cop">COP {pump.cop.toFixed(1)}</div>
                </div>
              ))}
            </div>

            {/* Uptime row */}
            <div className="uptime-row" style={{ padding: '12px 16px', borderTop: '1px solid #2a3f58', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono', color: '#4a6480', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{T('stat.uptime')}</div>
                <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'JetBrains Mono', color: '#79D89F', letterSpacing: '-0.03em' }}>{YV.stats.uptime_pct}%</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono', color: '#4a6480', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{T('stat.energytoday')}</div>
                <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'JetBrains Mono', color: '#6BC4D6', letterSpacing: '-0.03em' }}>{YV.stats.energy_today_kwh} kWh</div>
              </div>
              <a href="Tier2 Service.html" style={{ padding: '8px 14px', background: '#6BC4D6', borderRadius: 7, color: 'white', fontSize: 12, fontWeight: 600, textDecoration: 'none' }}>
                {T('nav.serviceview')}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
